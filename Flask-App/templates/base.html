<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}E-CarStart{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">

<div class="container">

<a class="navbar-brand fw-bold text-primary" href="/">E-CarStart</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item"><a class="nav-link" href="/">Home</a></li>

<li class="nav-item"><a class="nav-link" href="/about">About</a></li>

<li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>

<li class="nav-item"><a class="nav-link" href="/story">Story</a></li>

<li class="nav-item"><a class="nav-link" href="/team">Team</a></li>

<li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>

</ul>

<a href="/dashboard" class="btn btn-primary ms-3">Get Started</a>

</div>

</div>

</nav>

{% block content %}
{% endblock %}

<footer class="bg-primary text-white text-center p-3 mt-5">

© 2026 E-CarStart

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
